<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a Love Doctor account for access to guidance and events.">
  <title>Sign Up | Love Doctor</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-auth">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Love Doctor home">
      <img src="images/4-transparent.png" alt="Love Doctor logo">
      <span>Love Doctor</span>
    </a>

    <button class="nav-toggle" id="navToggle" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="siteNav">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="site-nav" id="siteNav" aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="marriage.html">Marriage Guidance</a>
      <a href="events.html">Events</a>
      <a href="contact.html">Contact</a>
      <a class="nav-action auth-link" href="login.html">Login</a>
    </nav>
  </header>

  <main class="auth-main">
    <section class="auth-shell">
      <div class="auth-showcase" data-reveal>
        <p class="section-kicker">Create Account</p>
        <h1>Join Love Doctor and explore a more intentional marriage journey</h1>
        <p class="section-text">
          Your account unlocks the full experience, including guidance pages, event details, and direct contact tools.
        </p>
      </div>

      <div class="auth-card" data-reveal>
        <p class="section-kicker">Sign Up</p>
        <form id="signupForm" class="auth-form">
          <label for="signupName">Full Name</label>
          <input id="signupName" type="text" placeholder="Your full name" required>

          <label for="signupEmail">Email</label>
          <input id="signupEmail" type="email" placeholder="you@example.com" required>

          <label for="signupPassword">Password</label>
          <input id="signupPassword" type="password" placeholder="Minimum 6 characters" minlength="6" required>

          <label for="signupConfirm">Confirm Password</label>
          <input id="signupConfirm" type="password" placeholder="Re-enter your password" minlength="6" required>

          <button class="button button-primary" type="submit">Create Account</button>
          <p class="form-status" id="signupStatus" role="status" aria-live="polite"></p>
        </form>

        <p class="helper-text">Already have an account? <a class="text-link" href="login.html">Log in</a></p>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
